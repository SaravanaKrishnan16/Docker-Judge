apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: dockerjudge-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dockerjudge-frontend
  template:
    metadata:
      labels:
        app: dockerjudge-frontend
    spec:
      containers:
      - name: frontend
        image: saravanakrishnan/dockerjudge-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: api-config
          mountPath: /usr/share/nginx/html/api-config.js
          subPath: api-config.js
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: api-config
        configMap:
          name: api-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: dockerjudge-frontend
spec:
  selector:
    app: dockerjudge-frontend
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 80
    nodePort: 30080
  type: LoadBalancer